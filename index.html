<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Weekly QA Counter</title>
  <meta name="theme-color" content="#0f172a" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="icon" href='data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"%3E%3Crect width="64" height="64" rx="16" fill="%230f172a"/%3E%3Cpath d="M18 34l9 9 19-23" fill="none" stroke="%2338bdf8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/%3E%3Ccircle cx="20" cy="19" r="4" fill="%23fbbf24"/%3E%3C/svg%3E' />
  <link rel="stylesheet" href="./styles.css?v=500" />
</head>
<body>
  <div id="app">
    <div class="auth-card">
      <div class="brand-mark">✓</div>
      <h1>Weekly QA Counter</h1>
      <p>Loading dashboard...</p>
    </div>
  </div>

  <script>
    window.QA_COUNTER_BUILD = "full-repo-v500";
    console.log("Weekly QA Counter build:", window.QA_COUNTER_BUILD);
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js?v=500"></script>
  <script>
    if (!window.SUPABASE_URL || !window.SUPABASE_ANON_KEY) {
      document.getElementById("app").innerHTML =
        '<div class="auth-card"><h1>Config missing</h1><p>Open config.js and add your Supabase Project URL and anon public key.</p></div>';
      throw new Error("Missing Supabase config");
    }
  </script>
  <script src="./app.js?v=500"></script>
</body>
</html>
